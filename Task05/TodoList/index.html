<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To do list</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Remix Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    />
  </head>

  <body>
    <div class="card-list">
      <h2>Add your item to the List</h2>
      <input type="text" id="item-input" placeholder="Please enter your item" />
      <ul id="list"></ul>
      <button id="add-btn">
        Add new item <i class="ri-add-large-line"></i>
      </button>
    </div>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
  </body>
</html>
